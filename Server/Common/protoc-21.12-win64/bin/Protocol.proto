syntax = "proto3";
package Protocol;

import "Enum.proto";
import "Struct.proto";


message REQ_LOGIN
{
	bool is_create = 1;
	string id = 2;
	string pw = 3;
	string name = 4;
}

message ACK_LOGIN
{
	uint64 idx = 1;
	string user_name = 2;
	LOGIN_ERROR result = 3;
}

message REQ_LOGOUT
{
	uint64 idx = 1;
}

message ACK_LOGOUT
{
	LOGOUT_ERROR result = 1;
}

message REQ_CHAT
{
	string message = 1;
	CHAT_STATE chat_state = 2;
}

message ACK_CHAT
{
	CHAT_ERROR result = 1;
}

message ACK_SEND_CHAT
{
	string user_name = 1;
	string message = 2;
}