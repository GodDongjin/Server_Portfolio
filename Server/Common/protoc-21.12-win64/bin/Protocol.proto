syntax = "proto3";
package Protocol;

import "Enum.proto";
import "Struct.proto";


message REQ_LOGIN
{
	bool is_create = 1;
	string id = 2;
	string pw = 3;
}

message ACK_LOGIN
{
	uint64 idx = 1;
	LOGIN_ERROR result = 2;
}

message REQ_CHAT
{
	string message = 1;
}

message ACK_CHAT
{
	string message = 1;
}